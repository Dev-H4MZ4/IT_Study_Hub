<!DOCTYPE html>
<html lang="en" id="html-root" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <title>SE Master - Premium Study Platform</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="ambient-background">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
    </div>

    <div class="app-layout">
        <nav class="premium-nav">
            <div class="nav-brand">
                <div class="brand-icon"><i class="ph-fill ph-code"></i></div>
                <h1 data-en="SE Master" data-ar="إتقان البرمجيات">SE Master</h1>
            </div>
            
            <div class="nav-menu">
                <button class="nav-item active" onclick="renderDashboard()" id="nav-home">
                    <i class="ph ph-squares-four"></i>
                    <span data-en="Dashboard" data-ar="الرئيسية">Dashboard</span>
                </button>
                <button class="nav-item" id="nav-stats">
                    <i class="ph ph-chart-pie-slice"></i>
                    <span data-en="Progress" data-ar="تقدمي">Progress</span>
                </button>
            </div>

            <div class="nav-actions">
                <button id="lang-toggle" class="action-btn" title="Toggle Language">
                    <i class="ph ph-translate"></i>
                    <span id="lang-label" class="action-text">EN+AR</span>
                </button>
                <button id="theme-toggle" class="action-btn" title="Toggle Theme">
                    <i class="ph ph-moon"></i>
                    <span data-en="Theme" data-ar="المظهر" class="action-text">Theme</span>
                </button>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <div class="greeting">
                    <h2 data-en="Welcome back, Engineer" data-ar="مرحباً بك يا مهندس">Welcome back, Engineer <span class="wave">👋</span></h2>
                    <p data-en="Ready to master Software Engineering?" data-ar="مستعد لاحتراف هندسة البرمجيات؟">Ready to master Software Engineering?</p>
                </div>
                <div class="search-container">
                    <i class="ph ph-magnifying-glass search-icon"></i>
                    <input type="text" id="global-search" class="premium-search" placeholder="Search any topic, question, or term..." data-en-placeholder="Search any topic, question, or term..." data-ar-placeholder="ابحث عن أي موضوع، سؤال، أو مصطلح...">
                    <div class="search-shortcut">⌘K</div>
                </div>
            </header>

            <div id="app-container" class="content-wrapper">
                </div>
        </main>
    </div>

    <div id="study-modal" class="premium-modal hidden">
        <div class="modal-backdrop" id="close-modal-backdrop"></div>
        <div class="modal-dialog">
            <div class="modal-header">
                <div class="modal-progress-container hidden" id="modal-progress-bar">
                    <div class="modal-progress-fill" id="modal-progress-fill"></div>
                </div>
                <button id="close-modal" class="close-btn"><i class="ph ph-x"></i></button>
            </div>
            <div id="modal-body" class="modal-body">
                </div>
        </div>
    </div>

    <script>
        window.courseData = { chapters: [] };
    </script>
    
    <script src="data_ch1.js"></script>
    <script src="data_ch2.js"></script>
    <script src="data_ch3.js"></script>
    <script src="data_ch5.js"></script>
    <script src="data_ch6.js"></script>

    <script src="script.js"></script>
</body>
</html>
